name: GitHub Classroom Autograding
on: [push]
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  autograding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Files
        id: checkfiles
        uses: classroom-resources/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'Required Files'
          setup-command: 'chmod +x .github/scripts/check_assignment.sh'
          command: './.github/scripts/check_assignment.sh files'
          timeout: 1
          max-score: 25

      - name: Check HTML
        id: checkhtml
        uses: classroom-resources/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'HTML Structure'
          command: './.github/scripts/check_assignment.sh html'
          timeout: 1
          max-score: 25

      - name: Check CSS
        id: checkcss
        uses: classroom-resources/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'CSS Mobile Optimizations'
          command: './.github/scripts/check_assignment.sh css'
          timeout: 1
          max-score: 25

      - name: Check Layout
        id: checklayout
        uses: classroom-resources/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'Layout & FPV Container'
          command: './.github/scripts/check_assignment.sh layout'
          timeout: 1
          max-score: 25

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        if: always()
        with:
          runners: checkfiles,checkhtml,checkcss,checklayout
