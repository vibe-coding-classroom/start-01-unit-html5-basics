name: GitHub Classroom Autograding
on: [push]
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  autograding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Files
        id: check_files
        uses: education/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'Required Files'
          setup-command: 'chmod +x .github/scripts/check_assignment.sh'
          command: './.github/scripts/check_assignment.sh files'
          timeout: 1
          max-score: 25

      - name: Check HTML
        id: check_html
        uses: education/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'HTML Structure'
          command: './.github/scripts/check_assignment.sh html'
          timeout: 1
          max-score: 25

      - name: Check CSS
        id: check_css
        uses: education/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'CSS Mobile Optimizations'
          command: './.github/scripts/check_assignment.sh css'
          timeout: 1
          max-score: 25

      - name: Check Layout
        id: check_layout
        uses: education/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'Layout & FPV Container'
          command: './.github/scripts/check_assignment.sh layout'
          timeout: 1
          max-score: 25

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        if: always()
        env:
          CHECK_FILES_SCORE: ${{ steps.check_files.outputs.score }}
          CHECK_HTML_SCORE: ${{ steps.check_html.outputs.score }}
          CHECK_CSS_SCORE: ${{ steps.check_css.outputs.score }}
          CHECK_LAYOUT_SCORE: ${{ steps.check_layout.outputs.score }}
        with:
          runners: check_files,check_html,check_css,check_layout
