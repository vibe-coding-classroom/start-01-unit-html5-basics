name: GitHub Classroom Autograding
on: [push]
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  autograding:
    outputs:
      grader_score: ${{ steps.grader.outputs.score }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Full Assignment Check
        id: grader
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: 'HTML5 Basics Validation'
          setup-command: 'chmod +x .github/scripts/check_assignment.sh'
          command: './.github/scripts/check_assignment.sh'
          timeout: 2
          max-score: 100
      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          GRADER_SCORE: ${{ steps.grader.outputs.score }}
        with:
          runners: grader
